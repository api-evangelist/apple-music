type MusicVideoDetails {
  id: ID!
  type: String!
  href: String
  attributes: MusicVideoAttributes
  relationships: MusicVideoRelationships
}

type MusicVideoRelationships {
  albums: AlbumConnection
  artists: ArtistConnection
  genres: GenreConnection
  library: LibraryMusicVideoConnection
