# Apple Music GraphQL Schema
# Conceptual GraphQL schema derived from the Apple Music REST API (MusicKit API)
# Source: https://developer.apple.com/documentation/applemusicapi

# -----------------------------------------------------------------------
# Scalars
# -----------------------------------------------------------------------

scalar URL
scalar DateTime
scalar ISO8601Duration

# -----------------------------------------------------------------------
# Enums
# -----------------------------------------------------------------------

enum ContentRating {
  CLEAN
  EXPLICIT
  NOT_EXPLICIT
}

enum PlaylistType {
  USER_SHARED
  EDITORIAL
  EXTERNAL
  PERSONAL_MIX
  REPLAY
}

enum StationType {
  APPLE_MUSIC
  BEATS_ONE
  USER
  RADIO
}

# -----------------------------------------------------------------------
# Artwork Types
# -----------------------------------------------------------------------

type ArtworkURL {
  template: String!
  width: Int
  height: Int
}

type ArtworkDetails {
  width: Int!
  height: Int!
  url: URL!
  bgColor: String
  textColor1: String
  textColor2: String
  textColor3: String
  textColor4: String
}

type Artwork {
  id: ID!
  details: ArtworkDetails
  url: ArtworkURL
}

# -----------------------------------------------------------------------
# Genre Types
# -----------------------------------------------------------------------

type GenreName {
  name: String!
}

type GenreDetails {
  id: ID!
  name: String!
  parentId: String
  parentName: String
}

type Genre {
  id: ID!
  type: String!
  href: String
  attributes: GenreDetails
}

# -----------------------------------------------------------------------
# Artist Types
# -----------------------------------------------------------------------

type ArtistBio {
  content: String
  lastUpdated: DateTime
  source: String
  url: URL
}

type ArtistAttributes {
  name: String!
  genreNames: [String!]!
  url: URL
  artwork: ArtworkDetails
  editorialNotes: EditorialNotes
}

type ArtistGenres {
  data: [Genre!]!
  href: String
  next: String
}

type ArtistAlbums {
  data: [Album!]!
  href: String
  next: String
}

type ArtistSongs {
  data: [Song!]!
  href: String
  next: String
}

type ArtistPlaylists {
  data: [Playlist!]!
  href: String
  next: String
}

type ArtistDetails {
  id: ID!
  type: String!
  href: String
  attributes: ArtistAttributes
  relationships: ArtistRelationships
  bio: ArtistBio
}

type ArtistRelationships {
  albums: ArtistAlbums
  genres: ArtistGenres
  musicVideos: MusicVideoConnection
  playlists: ArtistPlaylists
  songs: ArtistSongs
}

type Artist {
  id: ID!
  type: String!
  href: String
  attributes: ArtistAttributes
  relationships: ArtistRelationships
}

# -----------------------------------------------------------------------
# Album Types
# -----------------------------------------------------------------------

type AlbumAttributes {
  artistName: String!
  artwork: ArtworkDetails
  contentRating: ContentRating
  copyright: String
  editorialNotes: EditorialNotes
  genreNames: [String!]!
  isCompilation: Boolean
  isComplete: Boolean
  isMasteredForItunes: Boolean
  isSingle: Boolean
  name: String!
  playParams: PlayParameters
  recordLabel: String
  releaseDate: String
  trackCount: Int!
  upc: String
  url: URL
}

type AlbumSongs {
  data: [Song!]!
  href: String
  next: String
}

type AlbumArtwork {
  data: ArtworkDetails
  href: String
}

type AlbumDetails {
  id: ID!
  type: String!
  href: String
  attributes: AlbumAttributes
  relationships: AlbumRelationships
}

type AlbumRelationships {
  artists: ArtistConnection
  genres: GenreConnection
  tracks: AlbumSongs
}

type Album {
  id: ID!
  type: String!
  href: String
  attributes: AlbumAttributes
  relationships: AlbumRelationships
}

# -----------------------------------------------------------------------
# Song Types
# -----------------------------------------------------------------------

type SongAttributes {
  albumName: String
  artistName: String!
  artwork: ArtworkDetails
  attribution: String
  composerName: String
  contentRating: ContentRating
  discNumber: Int
  durationInMillis: Int
  editorialNotes: EditorialNotes
  genreNames: [String!]!
  hasLyrics: Boolean
  isAppleDigitalMaster: Boolean
  isrc: String
  movementCount: Int
  movementName: String
  movementNumber: Int
  name: String!
  playParams: PlayParameters
  previews: [Preview!]
  releaseDate: String
  trackNumber: Int
  url: URL
  workName: String
}

type SongArtists {
  data: [Artist!]!
  href: String
  next: String
}

type SongAlbums {
  data: [Album!]!
  href: String
  next: String
}

type SongGenres {
  data: [Genre!]!
  href: String
  next: String
}

type SongRelationships {
  albums: SongAlbums
  artists: SongArtists
  composers: ArtistConnection
  genres: SongGenres
  library: LibrarySongConnection
  station: StationConnection
}

type SongDetails {
  id: ID!
  type: String!
  href: String
  attributes: SongAttributes
  relationships: SongRelationships
}

type Song {
  id: ID!
  type: String!
  href: String
  attributes: SongAttributes
  relationships: SongRelationships
}

# -----------------------------------------------------------------------
