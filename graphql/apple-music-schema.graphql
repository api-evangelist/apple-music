  href: String
  next: String
}

type Curator {
  id: ID!
  type: String!
  href: String
  attributes: CuratorAttributes
  relationships: CuratorRelationships
}

type CuratorRelationships {
  playlists: CuratorPlaylist
}

# -----------------------------------------------------------------------
# Library Types
# -----------------------------------------------------------------------

type LibrarySongAttributes {
  albumName: String
  artistName: String!
  artwork: ArtworkDetails
  contentRating: ContentRating
  discNumber: Int
  durationInMillis: Int
  genreNames: [String!]!
  hasLyrics: Boolean
  name: String!
  playParams: PlayParameters
  releaseDate: String
  trackNumber: Int
}

type LibraryAlbumAttributes {
  artistName: String!
  artwork: ArtworkDetails
  contentRating: ContentRating
  dateAdded: DateTime
  genreNames: [String!]!
  name: String!
  playParams: PlayParameters
  releaseDate: String
  trackCount: Int
}

type LibraryArtistAttributes {
  name: String!
  genreNames: [String!]
}

type LibraryPlaylistAttributes {
  artwork: ArtworkDetails
  canEdit: Boolean
  dateAdded: DateTime
  description: EditorialNotes
  hasCatalog: Boolean
  isPublic: Boolean
  name: String!
  playParams: PlayParameters
}

type LibraryMusicVideoAttributes {
  albumName: String
  artistName: String!
  artwork: ArtworkDetails
  contentRating: ContentRating
  durationInMillis: Int
  genreNames: [String!]!
  name: String!
  playParams: PlayParameters
  releaseDate: String
  trackNumber: Int
}

type LibrarySongPlayback {
  id: ID!
  playParams: PlayParameters
  durationInMillis: Int
  remainingTime: Int
}

type LibrarySong {
  id: ID!
  type: String!
  href: String
  attributes: LibrarySongAttributes
  relationships: LibrarySongRelationships
}

type LibrarySongRelationships {
  albums: LibraryAlbumConnection
  artists: LibraryArtistConnection
}

type LibraryAlbum {
  id: ID!
  type: String!
  href: String
  attributes: LibraryAlbumAttributes
  relationships: LibraryAlbumRelationships
}

type LibraryAlbumRelationships {
  artists: LibraryArtistConnection
  tracks: LibrarySongConnection
}

type LibraryArtist {
  id: ID!
  type: String!
  href: String
  attributes: LibraryArtistAttributes
  relationships: LibraryArtistRelationships
}

type LibraryArtistRelationships {
  albums: LibraryAlbumConnection
}

type LibraryPlaylist {
  id: ID!
  type: String!
  href: String
  attributes: LibraryPlaylistAttributes
  relationships: LibraryPlaylistRelationships
}

type LibraryPlaylistRelationships {
  tracks: LibrarySongConnection
}

type LibraryMusicVideo {
  id: ID!
  type: String!
  href: String
  attributes: LibraryMusicVideoAttributes
  relationships: LibraryMusicVideoRelationships
}

type LibraryMusicVideoRelationships {
  albums: LibraryAlbumConnection
  artists: LibraryArtistConnection
}

# -----------------------------------------------------------------------
# StoreFront Types
# -----------------------------------------------------------------------

type StoreFrontAttributes {
  defaultLanguageTag: String!
  explicitContentPolicy: String!
  name: String!
  supportedLanguageTags: [String!]!
}

type StoreFrontDetails {
  id: ID!
  type: String!
  href: String
  attributes: StoreFrontAttributes
}

type StoreFront {
  id: ID!
  type: String!
  href: String
  attributes: StoreFrontAttributes
}

# -----------------------------------------------------------------------
# Search Types
# -----------------------------------------------------------------------

type SearchHints {
  terms: [String!]!
}

type SearchResult {
  songs: SongConnection
  albums: AlbumConnection
  artists: ArtistConnection
  playlists: PlaylistConnection
  musicVideos: MusicVideoConnection
  stations: StationConnection
  curators: CuratorConnection
}

type CatalogSearch {
  results: SearchResult
  meta: SearchMeta
}

type LibrarySearch {
  results: LibrarySearchResult
  meta: SearchMeta
}

type LibrarySearchResult {
  songs: LibrarySongConnection
  albums: LibraryAlbumConnection
  artists: LibraryArtistConnection
  playlists: LibraryPlaylistConnection
  musicVideos: LibraryMusicVideoConnection
}

type Search {
  catalog: CatalogSearch
  library: LibrarySearch
  hints: SearchHints
}

# -----------------------------------------------------------------------
# Discovery / Personalization Types
# -----------------------------------------------------------------------

type PersonalMix {
  id: ID!
  type: String!
  href: String
  attributes: PlaylistAttributes
}

type PersonalStation {
  id: ID!
  type: String!
  href: String
  attributes: StationAttributes
}

type Recommendations {
  data: [Playlist!]!
  personalMixes: [PersonalMix!]
  stations: [PersonalStation!]
  next: String
}

type RecentlyPlayed {
  data: [RecentlyPlayedItem!]!
  next: String
}

type SocialActivity {
  userId: ID!
  recentlyPlayed: RecentlyPlayed
  recommendations: Recommendations
}

# -----------------------------------------------------------------------
# Authentication / Token Types
# -----------------------------------------------------------------------

type DeveloperToken {
  token: String!
  expiresAt: DateTime
  teamId: String
  keyId: String
}

type UserToken {
  musicUserToken: String!
  expiresAt: DateTime
}

type APIKey {
  keyId: String!
  teamId: String!
  privateKey: String
  algorithm: String
}

type MusicKitToken {
  developerToken: DeveloperToken
  userToken: UserToken
  storefront: String
}

# -----------------------------------------------------------------------
# Supporting / Utility Types
# -----------------------------------------------------------------------

type EditorialNotes {
  name: String
  short: String
  standard: String
  tagline: String
}

type PlayParameters {
  id: String!
  kind: String!
  isLibrary: Boolean
  reporting: Boolean
  reportingId: String
  versionHash: String
}

type Preview {
  artwork: ArtworkDetails
  url: URL!
  hlsUrl: URL
}

type SearchMeta {
  results: SearchMetaResults
}

type SearchMetaResults {
  order: [String!]
  rawOrder: [String!]
}

# -----------------------------------------------------------------------
# Connection / Pagination Types
# -----------------------------------------------------------------------

type SongConnection {
  data: [Song!]!
  href: String
  next: String
}

type AlbumConnection {
  data: [Album!]!
  href: String
  next: String
}

type ArtistConnection {
  data: [Artist!]!
  href: String
  next: String
}

type PlaylistConnection {
  data: [Playlist!]!
  href: String
  next: String
}

type MusicVideoConnection {
  data: [MusicVideo!]!
  href: String
  next: String
}

type StationConnection {
  data: [Station!]!
  href: String
  next: String
}

type CuratorConnection {
  data: [Curator!]!
  href: String
  next: String
}

type GenreConnection {
  data: [Genre!]!
  href: String
  next: String
}

type LibrarySongConnection {
  data: [LibrarySong!]!
  href: String
  next: String
}

type LibraryAlbumConnection {
  data: [LibraryAlbum!]!
  href: String
  next: String
}

type LibraryArtistConnection {
  data: [LibraryArtist!]!
  href: String
  next: String
}

type LibraryPlaylistConnection {
  data: [LibraryPlaylist!]!
  href: String
  next: String
}

type LibraryMusicVideoConnection {
  data: [LibraryMusicVideo!]!
  href: String
  next: String
}

type RecentlyPlayedItem {
  id: ID!
  type: String!
  href: String
  attributes: RecentlyPlayedAttributes
}

type RecentlyPlayedAttributes {
  name: String!
  artwork: ArtworkDetails
  playParams: PlayParameters
  url: URL
}

# -----------------------------------------------------------------------
# Root Query Type
# -----------------------------------------------------------------------

type Query {
  # Catalog — Songs
  song(id: ID!, storefront: String!): Song
  songs(ids: [ID!]!, storefront: String!): SongConnection
  songDetails(id: ID!, storefront: String!): SongDetails

  # Catalog — Albums
  album(id: ID!, storefront: String!): Album
  albums(ids: [ID!]!, storefront: String!): AlbumConnection
  albumDetails(id: ID!, storefront: String!): AlbumDetails

  # Catalog — Artists
  artist(id: ID!, storefront: String!): Artist
  artists(ids: [ID!]!, storefront: String!): ArtistConnection
  artistDetails(id: ID!, storefront: String!): ArtistDetails

  # Catalog — Music Videos
  musicVideo(id: ID!, storefront: String!): MusicVideo
  musicVideos(ids: [ID!]!, storefront: String!): MusicVideoConnection
  musicVideoDetails(id: ID!, storefront: String!): MusicVideoDetails

  # Catalog — Playlists
  playlist(id: ID!, storefront: String!): Playlist
  playlists(ids: [ID!]!, storefront: String!): PlaylistConnection
  playlistDetails(id: ID!, storefront: String!): PlaylistDetails

  # Catalog — Stations
  station(id: ID!, storefront: String!): Station
  stations(ids: [ID!]!, storefront: String!): StationConnection

  # Catalog — Genres
  genre(id: ID!, storefront: String!): Genre
  genres(storefront: String!): GenreConnection

  # Catalog — Curators
  curator(id: ID!, storefront: String!): Curator
  curators(ids: [ID!]!, storefront: String!): CuratorConnection

  # Search
  search(term: String!, storefront: String!, types: [String!], limit: Int, offset: Int): Search
  searchHints(term: String!, storefront: String!): SearchHints
  catalogSearch(term: String!, storefront: String!, types: [String!], limit: Int, offset: Int): CatalogSearch
  librarySearch(term: String!, types: [String!], limit: Int, offset: Int): LibrarySearch

  # StoreFronts
  storefront(id: ID!): StoreFront
  storefronts(ids: [ID!]!): [StoreFront!]!
  storefrontDetails(id: ID!): StoreFrontDetails

  # Library (requires Music User Token)
  libraryAlbum(id: ID!): LibraryAlbum
  libraryAlbums(limit: Int, offset: Int): LibraryAlbumConnection
  libraryArtist(id: ID!): LibraryArtist
  libraryArtists(limit: Int, offset: Int): LibraryArtistConnection
  librarySong(id: ID!): LibrarySong
  librarySongs(limit: Int, offset: Int): LibrarySongConnection
  libraryPlaylist(id: ID!): LibraryPlaylist
  libraryPlaylists(limit: Int, offset: Int): LibraryPlaylistConnection
  libraryMusicVideo(id: ID!): LibraryMusicVideo
  libraryMusicVideos(limit: Int, offset: Int): LibraryMusicVideoConnection
  librarySongPlayback(id: ID!): LibrarySongPlayback

  # Personalization (requires Music User Token)
  recentlyPlayed(limit: Int, offset: Int): RecentlyPlayed
  recommendations(limit: Int, offset: Int): Recommendations
  personalMixes: [PersonalMix!]
  socialActivity(userId: ID!): SocialActivity
}

# -----------------------------------------------------------------------
# Root Mutation Type
# -----------------------------------------------------------------------

type Mutation {
  # Library management
  addSongToLibrary(catalogId: ID!): LibrarySong
  addAlbumToLibrary(catalogId: ID!): LibraryAlbum
  addPlaylistToLibrary(catalogId: ID!): LibraryPlaylist
  addMusicVideoToLibrary(catalogId: ID!): LibraryMusicVideo

  # Playlist management
  createLibraryPlaylist(name: String!, description: String, tracks: [ID!]): LibraryPlaylist
  addTracksToLibraryPlaylist(playlistId: ID!, trackIds: [ID!]!): LibraryPlaylist

  # Ratings
  rateSong(catalogId: ID!, rating: Int!): Song
  rateAlbum(catalogId: ID!, rating: Int!): Album
}
