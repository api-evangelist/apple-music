  isChart: Boolean
  lastModifiedDate: DateTime
  name: String!
  playlistType: PlaylistType
  playParams: PlayParameters
  trackTypes: [String!]
  url: URL
}

type PlaylistTracks {
  data: [Song!]!
  href: String
  next: String
}

type PlaylistArtwork {
  data: ArtworkDetails
  href: String
}

type PlaylistDetails {
  id: ID!
  type: String!
  href: String
  attributes: PlaylistAttributes
  relationships: PlaylistRelationships
}

type PlaylistRelationships {
  curator: CuratorConnection
  library: LibraryPlaylistConnection
  tracks: PlaylistTracks
}

type Playlist {
  id: ID!
  type: String!
  href: String
  attributes: PlaylistAttributes
  relationships: PlaylistRelationships
}

# -----------------------------------------------------------------------
# Station Types
# -----------------------------------------------------------------------

type StationAttributes {
  artwork: ArtworkDetails
  durationInMillis: Int
  editorialNotes: EditorialNotes
  episodeNumber: Int
  isLive: Boolean
  name: String!
  playParams: PlayParameters
