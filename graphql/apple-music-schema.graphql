  type: String!
  href: String
  attributes: StationAttributes
  episodeNumber: Int
}

type UserStation {
  id: ID!
  type: String!
  href: String
  attributes: StationAttributes
  createdDate: DateTime
}

type Station {
  id: ID!
  type: String!
  href: String
  attributes: StationAttributes
}

# -----------------------------------------------------------------------
