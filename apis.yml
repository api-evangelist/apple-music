name: Apple Music
kind: company
description: Apple Music is Apple's streaming music service. The Apple Music API and
  MusicKit framework give developers access to the Apple Music catalog, user library,
  charts, recommendations, search, and playback control. Authentication is via Apple
  Developer Program JWT tokens; user library access requires a MusicKit Music User
  Token.
