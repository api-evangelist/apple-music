specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Apple Music
providerId: apple-music
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Music
- Streaming
- Apple
- MusicKit
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps profile for Apple Music. The Apple Music API does not bill per-call. The two cost lines are (1) the annual Apple Developer Program fee and (2) end-user Apple Music subscriptions consumed by app users. Apple does not invoice apps for catalog calls.
notes: API is free with the Developer Program; consumer subscriptions are billed directly by Apple to end users, not to the app developer.
sources:
- https://developer.apple.com/programs/
- https://developer.apple.com/documentation/applemusicapi
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Apple Inc.
serviceCategory: Music Streaming
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual (developer) / Monthly (consumer)
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Subscription
focusColumns:
  ServiceName: Apple Music
  ServiceCategory: Music Streaming
  ProviderName: Apple Inc.
  PublisherName: Apple Inc.
  InvoiceIssuerName: Apple Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
- name: developer_program_membership
  description: Annual Apple Developer Program membership.
  unit: year
  aggregation: sum
  dimensions:
  - team_id
- name: end_user_subscription
  description: Apple Music subscription billed directly to the end user.
  unit: month
  aggregation: count
  dimensions:
  - tier
  - country
principles:
- name: Visibility
  description: Track Apple Developer Program renewals; understand subscriber-mix drives feature availability, not your cost.
- name: Allocation
  description: Allocate Developer Program cost to the team owning the MusicKit identifier.
- name: Optimization
  description: No call-level optimization needed; cache catalog data and minimize repeated lookups.
- name: Accountability
  description: Single team owns the MusicKit identifier and signing key.
