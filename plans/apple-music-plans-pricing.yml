specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Apple Music
providerId: apple-music
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Music
- Streaming
- Apple
- MusicKit
- Plans
description: >-
  Apple Music API access is tied to the Apple Developer Program ($99/year). There is no per-call fee. End-user access to library/playback features requires an active Apple Music subscription on the user's Apple ID.
notes: API is free with Apple Developer Program membership; library/playback require an active Apple Music subscription on the user side.
sources:
- https://developer.apple.com/programs/
- https://www.apple.com/apple-music/
plans:
- id: apple-developer-program
  name: Apple Developer Program
  type: paid
  description: Required to obtain a MusicKit identifier and sign developer tokens for Apple Music API access.
  entries:
  - label: Developer Membership
    name: dev_membership
    type: flat
    metric: year
    limit: -1
    timeFrame: yearly
    geo: global
    unit: 1
    price: 99 USD/year
    userMultiplied: false
  elements:
  - name: MusicKit identifier
  - name: Developer token signing key
- id: apple-music-subscription
  name: Apple Music Subscription (End-User)
  type: subscription
  description: End users require an active Apple Music subscription to use library, playback, and personalized endpoints.
  entries:
  - label: Individual / Family / Student / Voice
    name: tiers
    type: flat
    metric: month
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: see https://www.apple.com/apple-music/
    userMultiplied: false
  elements:
  - name: Multiple consumer tiers
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
